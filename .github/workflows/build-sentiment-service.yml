name: Publicar sentiment-service en GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths:
      - "sentiment-service/**"
      - ".github/workflows/build-sentiment-service.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sentiment-service

jobs:
  build-and-push:
    runs-on: self-hosted 
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar modelo desde OCI Object Storage
        run: |
          echo "📥 Descargando modelo desde OCI..."
          
          # Descargar el archivo TAR.GZ desde OCI (en carpeta sentiment_analysis/)
          curl -L "${{ secrets.URL_READ_SENTIMENT }}sentiment_analysis/modelo_onnx.tar.gz" \
            -o modelo_onnx.tar.gz
          
          # Verificar que se descargó correctamente (debe ser > 100MB)
          FILE_SIZE=$(stat -c%s "modelo_onnx.tar.gz")
          if [ "$FILE_SIZE" -lt 100000000 ]; then
            echo "❌ Error: archivo descargado es muy pequeño ($FILE_SIZE bytes)"
            echo "Probablemente sea un error HTML, no el modelo real"
            exit 1
          fi
          
          # Descomprimir en sentiment-service/
          # El TAR contiene: modelo_onnx/modelo_normal/ y modelo_onnx/modelo_quantized/
          tar -xzf modelo_onnx.tar.gz -C sentiment-service/
          
          # Verificar que se descargó correctamente
          if [ ! -f "sentiment-service/modelo_onnx/modelo_quantized/model.onnx" ]; then
            echo "❌ Error: el modelo no se extrajo correctamente"
            exit 1
          fi
          
          # Limpiar
          rm modelo_onnx.tar.gz
          
          echo "✅ Modelo descargado y configurado"
          ls -lah sentiment-service/modelo_onnx/

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticarse en GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalizar image name a minúsculas
        id: image-lower
        run: echo "ref=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-lower.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build y Push a GHCR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./sentiment-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.image-lower.outputs.ref }}:cache
          cache-to: type=registry,ref=${{ steps.image-lower.outputs.ref }}:cache,mode=max
          platforms: linux/arm64

      - name: Extraer image tag
        id: image-tag
        if: github.event_name != 'pull_request'
        run: |
          # Extraer el tag de la metadata (main-<short-sha>)
          TAGS="${{ steps.meta.outputs.tags }}"
          
          # Obtener el primer tag que tenga formato main-
          IMAGE_TAG=$(echo "$TAGS" | grep -oP 'main-[a-f0-9]+' | head -1)
          
          if [ -z "$IMAGE_TAG" ]; then
            # Fallback: usar commit SHA corto
            IMAGE_TAG="main-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "📦 Image tag: ${IMAGE_TAG}"

      - name: Mostrar resumen
        run: |
          echo "✅ Build completado"
          echo "📦 Imagen: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "📦 Image tag exportado: ${{ steps.image-tag.outputs.tag }}"
          fi

  deploy-to-k3s:
      name: Deploy to K3S
      needs: build-and-push
      if: github.event_name != 'pull_request'
      uses: gabrielWYP/K3S_Infra/.github/workflows/deploy-sentiment-analysis.yml@main
      with:
        image-tag: ${{ needs.build-and-push.outputs.image-tag }}
        kube-namespace: ${{ vars.KUBE_NAMESPACE }}
        kube-deployment: ${{ vars.KUBE_DEPLOYMENT_MODEL }}
        registry: ${{ vars.REGISTRY }}
        port : ${{ vars.PORT_MODEL}}
      secrets:
        KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        ORACLE_USER: ${{ secrets.ORACLE_USER }}
        ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        ORACLE_CONNECTION_STRING: ${{ secrets.ORACLE_CONNECTION_STRING }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
